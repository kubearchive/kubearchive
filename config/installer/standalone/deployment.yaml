---
apiVersion: v1
kind: Namespace
metadata:
  name: kubearchive-installer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubearchive-installer
  namespace: kubearchive-installer
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kubearchive-installer
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kubearchive-installer
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kubearchive-installer
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - args:
          - --leader-elect
          - --health-probe-bind-address=:8081
          - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        image: ko://github.com/kubearchive/kubearchive/cmd/installer
        name: manager
        ports:
          - containerPort: 9443
            name: webhook-server
            protocol: TCP
        securityContext:
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
          - mountPath: /tmp/k8s-webhook-server/serving-certs
            name: webhook-certs
            readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: kubearchive-installer-tls
      serviceAccountName: kubearchive-installer
      terminationGracePeriodSeconds: 10
